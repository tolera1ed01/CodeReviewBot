name: 'CodeReviewBot'
description: 'Automated AI code review on pull requests and commits using Gemini'
author: 'tolera1ed01'

inputs:
  gemini-api-key:
    description: 'Gemini API key for AI-powered reviews'
    required: true
  github-token:
    description: 'GitHub token for posting review comments (defaults to the workflow token)'
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Resolve action path
      run: echo "CODEBOT_ACTION_PATH=$(realpath '${{ github.action_path }}')" >> $GITHUB_ENV
      shell: bash

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ${{ env.CODEBOT_ACTION_PATH }}/package-lock.json

    - name: Install dependencies
      run: npm ci --prefix "$CODEBOT_ACTION_PATH"
      shell: bash

    - name: Run code review
      run: node "$CODEBOT_ACTION_PATH/src/main.js"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
